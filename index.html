<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜袭喵的个人主页</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-image: url('https://via.placeholder.com/150');
            background-size: cover;
            background-position: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile h1 {
            font-size: 28px;
            margin: 10px 0;
            color: #222;
        }

        .profile p {
            font-size: 16px;
            margin: 5px 0;
            color: #666;
        }

        .social-links {
            text-align: center;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
            padding: 10px 15px;
            font-size: 14px;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .social-links a.tiktok {
            background-color: #010101;
        }

        .social-links a.tiktok:hover {
            background-color: #333333;
        }

        .social-links a svg {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <div class="profile">
            <h1>夜袭喵</h1>
            <p>练枪魔怔人</p>
            <p>一个正在努力的少年。</p>
        </div>
        <div class="social-links">
            <!-- 抖音链接 -->
            <a href="https://v.douyin.com/iUr1sts2/" class="tiktok" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19.5 3.55c-1.79-.11-3.45-1.03-4.49-2.55h-2.18v14.19a2.9 2.9 0 0 1-4.18 2.59 2.92 2.92 0 0 1 1.28-5.58c.16 0 .32.01.48.04V9.94c-5.03-.05-5.48 3.84-5.48 3.84a8.26 8.26 0 0 0 8.09 9.7c3.67 0 6.75-2.38 7.83-5.64-.03-.01-.05-.02-.08-.03a6.78 6.78 0 0 1-1.17-.42l-.06-.03c-.85-.34-1.82-.94-1.82-.94v-9.33c1.01.71 2.23 1.14 3.5 1.18v-3.4Z"></path>
                </svg>
                抖音
            </a>
        </div>
    </div>
</body>
</html>
