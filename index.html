<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Webpage</title>
    <style>
        /* 外部样式表 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        
        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-color: #ccc;
        }
        
        .profile {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .profile h1 {
            font-size: 24px;
            margin: 0;
        }
        
        .profile p {
            font-size: 16px;
            margin: 10px 0;
        }
        
        .social-links {
            text-align: center;
        }
        
        .social-links a {
            display: inline-block;
            margin: 5px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <div class="profile">
            <h1>John Doe</h1>
            <p>Front-end Developer</p>
            <p>Passionate about creating user-friendly web experiences.</p>
        </div>
        <div class="social-links">
            <a href="https://github.com/johndoe">GitHub</a>
            <a href="https://linkedin.com/in/johndoe">LinkedIn</a>
            <a href="https://twitter.com/johndoe">Twitter</a>
        </div>
    </div>
</body>
</html>
