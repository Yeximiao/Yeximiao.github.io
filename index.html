<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜袭喵的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: url('Image/背景1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }
        
        /* 覆盖层增强背景可读性 - 透明度降低 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(25, 25, 40, 0.65); /* 透明度降低 */
            z-index: -1;
        }
        
        /* 背景动态效果 */
        .background-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(102, 0, 255, 0.15);
            box-shadow: 0 0 50px rgba(102, 0, 255, 0.3);
            animation: float 15s infinite linear;
        }
        
        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .circle:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 70%;
            left: 80%;
            animation-delay: -5s;
        }
        
        .circle:nth-child(3) {
            width: 150px;
            height: 150px;
            top: 40%;
            left: 85%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }
        
        /* 容器样式 */
        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
            padding: 40px;
            background: rgba(25, 25, 40, 0.8);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(102, 0, 255, 0.3);
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        
        /* 头像样式 */
        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: url('Image/夜袭喵头像1.jpg') center center/cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(102, 0, 255, 0.5);
            position: relative;
        }
        
        .avatar::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
        
        /* 个人信息样式 */
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(102, 0, 255, 0.7);
            letter-spacing: 1px;
        }
        
        .profile p {
            font-size: 1.1rem;
            margin: 8px 0;
            color: #ddd;
            line-height: 1.6;
        }
        
        /* 游戏标签样式 */
        .game-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 25px 0;
        }
        
        .game-tag {
            display: inline-block;
            background: rgba(102, 0, 255, 0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #e0d6ff;
            border: 1px solid rgba(102, 0, 255, 0.4);
            transition: all 0.3s ease;
        }
        
        .game-tag:hover {
            background: rgba(102, 0, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 0, 255, 0.2);
        }
        
        /* 社交链接样式 */
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 30px 0;
        }
        
        .social-links a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: translateY(0);
        }
        
        .social-links a:hover {
            transform: translateY(-5px);
            box-shadow: 0 7px 15px rgba(0, 0, 0, 0.3);
        }
        
        .social-links a i {
            margin-right: 8px;
            font-size: 1.2rem;
        }
        
        .social-links a.steam {
            background: linear-gradient(135deg, #1b2838, #2a475e);
        }
        
        .social-links a.steam:hover {
            background: linear-gradient(135deg, #171a21, #1b2838);
        }
        
        .social-links a.tiktok {
            background: linear-gradient(135deg, #010101, #333333);
        }
        
        .social-links a.tiktok:hover {
            background: linear-gradient(135deg, #000000, #222222);
        }
        
        .social-links a.kook {
            background: linear-gradient(135deg, #32CD32, #228B22);
        }
        
        .social-links a.kook:hover {
            background: linear-gradient(135deg, #2db82d, #1d7a1d);
        }
        
        /* 页脚样式 - 完全透明 */
        .info-footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: transparent; /* 完全透明背景 */
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85); /* 半透明白色 */
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5); /* 文字阴影增强可读性 */
        }
        
        .info-footer span {
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 5px;
            background: transparent; /* 透明背景 */
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            .profile h1 {
                font-size: 2rem;
            }
            
            .social-links {
                flex-direction: column;
                align-items: center;
            }
            
            .social-links a {
                width: 80%;
                justify-content: center;
            }
        }
        
        /* 霓虹文字效果 */
        .neon-text {
            text-shadow: 
                0 0 5px rgba(102, 0, 255, 0.5),
                0 0 10px rgba(102, 0, 255, 0.5),
                0 0 20px rgba(102, 0, 255, 0.5),
                0 0 40px rgba(102, 0, 255, 0.5);
            animation: neon-glow 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes neon-glow {
            from {
                text-shadow: 
                    0 0 5px rgba(102, 0, 255, 0.5),
                    0 0 10px rgba(102, 0, 255, 0.5),
                    0 0 20px rgba(102, 0, 255, 0.5);
            }
            to {
                text-shadow: 
                    0 0 10px rgba(102, 0, 255, 0.7),
                    0 0 20px rgba(102, 0, 255, 0.7),
                    0 0 30px rgba(102, 0, 255, 0.7);
            }
        }
        
        /* 装饰元素 */
        .decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            background: transparent;
            border: 2px solid rgba(102, 0, 255, 0.3);
            z-index: -1;
            animation: rotate 30s linear infinite;
        }
        
        .decoration:nth-child(1) {
            top: 10%;
            left: 10%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }
        
        .decoration:nth-child(2) {
            bottom: 20%;
            right: 15%;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation-duration: 40s;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="background-effects">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <!-- 装饰元素 -->
    <div class="decoration"></div>
    <div class="decoration"></div>
    
    <!-- 主容器 -->
    <div class="container">
        <div class="avatar"></div>
        
        <div class="profile">
            <h1 class="neon-text">夜袭喵</h1>
            <p>练枪魔怔人 🔫 | 游戏狂热爱好者 🎮</p>
            <p>一个正在努力的少年</p>
        </div>
        
        <!-- 游戏标签 -->
        <div class="game-tags">
            <div class="game-tag">Aimlab</div>
            <div class="game-tag">KovaaK's</div>
            <div class="game-tag">TheFinals</div>
        </div>
        
        <!-- 社交链接 -->
        <div class="social-links">
            <a href="https://steamcommunity.com/id/Yeximiao/" class="steam" target="_blank">
                <i class="fab fa-steam"></i> Steam
            </a>
            <a href="https://v.douyin.com/iUr1sts2/" class="tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> 抖音
            </a>
            <a href="https://kook.vip/PvR2FC" class="kook" target="_blank">
                <i class="fas fa-headphones-alt"></i> Kook
            </a>
        </div>
    </div>
    
    <!-- 页脚 - 完全透明 -->
    <div class="info-footer">
        <span id="current-time"></span> | 网站已存在 <span id="website-duration"></span>
    </div>
    
    <script>
        // 设置网站开始时间
        const startTime = new Date("2024-12-14T13:00:00");
        
        function updateTime() {
            const currentTime = new Date();
            const duration = Math.floor((currentTime - startTime) / 1000);
            const days = Math.floor(duration / (3600 * 24));
            const hours = Math.floor((duration % (3600 * 24)) / 3600);
            const minutes = Math.floor((duration % 3600) / 60);
            const seconds = duration % 60;
            
            document.getElementById('current-time').textContent = currentTime.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            
            document.getElementById('website-duration').textContent = `${days}天 ${hours}小时 ${minutes}分 ${seconds}秒`;
        }
        
        setInterval(updateTime, 1000);
        updateTime(); // 初次调用
        
        // 鼠标移动背景效果
        document.addEventListener('mousemove', (e) => {
            const circles = document.querySelectorAll('.circle');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            circles.forEach((circle, index) => {
                const offsetX = (x * 20 - 10) * (index + 1);
                const offsetY = (y * 20 - 10) * (index + 1);
                circle.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        });
    </script>
</body>
</html>
