<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜袭喵的个人主页</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9; /* 默认背景色 */
            background-image: url('background1.jpg'); /* 背景图像 */
            background-size: cover; /* 填充整个视口 */
            background-position: center; /* 居中显示 */
            background-repeat: no-repeat; /* 不重复拼接 */
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: rgba(102, 0, 255, 0.75); /* 深紫色背景，75% 透明 */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            color: #fff; /* 白色文字，确保对比度 */
        }

        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-image: url('avatar.jpg'); /* 确保头像文件在正确路径 */
            background-size: cover;
            background-position: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile h1 {
            font-size: 28px;
            margin: 10px 0;
            color: #fff; /* 白色标题 */
        }

        .profile p {
            font-size: 16px;
            margin: 5px 0;
            color: #ddd; /* 浅灰文字 */
        }

        .social-links {
            text-align: center;
        }

        .social-links a {
            display: inline-block;
            margin: 5px;
            padding: 10px 15px;
            font-size: 14px;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            background-color: #333;
            transition: background-color 0.3s;
        }

        .social-links a:hover {
            background-color: #555;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: transparent; /* 完全透明背景 */
            font-size: 14px;
            color: #666;
        }

        .footer span {
            background-color: transparent; /* 确保文字背景透明 */
            padding: 2px 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <div class="profile">
            <h1>夜袭喵</h1>
            <p>练枪魔怔人</p>
            <p>一个正在努力的少年</p>
        </div>
        <div class="social-links">
            <a href="https://v.douyin.com/iUr1sts2/">抖音</a>
            <a href="https://kook.vip/PvR2FC">Kook</a>
        </div>
    </div>

    <div class="footer">
        <span id="current-time"></span> | 网站已存在 <span id="website-duration"></span>
    </div>

    <script>
        // 设置网站开始时间
        const startTime = new Date("2024-12-14T13:00:00");

        function updateTime() {
            const currentTime = new Date();
            const duration = Math.floor((currentTime - startTime) / 1000);
            const hours = Math.floor(duration / 3600);
            const minutes = Math.floor((duration % 3600) / 60);
            const seconds = duration % 60;

            document.getElementById('current-time').textContent = currentTime.toLocaleString();
            document.getElementById('website-duration').textContent = `${hours}小时 ${minutes}分钟 ${seconds}秒`;
        }

        setInterval(updateTime, 1000);
        updateTime(); // 初次调用
    </script>
</body>
</html>
