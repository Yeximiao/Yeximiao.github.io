<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜袭喵的个人主页</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9; /* 默认背景色 */
            background-image: url('background.jpg'); /* 背景图像 */
            background-size: cover; /* 填充整个视口 */
            background-position: center; /* 居中显示 */
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-image: url('avatar.jpg'); /* 确保头像文件和背景图像在同一路径下 */
            background-size: cover;
            background-position: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile h1 {
            font-size: 28px;
            margin: 10px 0;
            color: #222;
        }

        .profile p {
            font-size: 16px;
            margin: 5px 0;
            color: #666;
        }

        .social-links {
            text-align: center;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
            padding: 10px 15px;
            font-size: 14px;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .social-links a.tiktok {
            background-color: #010101;
        }

        .social-links a.tiktok:hover {
            background-color: #333333;
        }

        .social-links a.kook {
            background-color: #32CD32; /* 绿色背景 */
        }

        .social-links a.kook:hover {
            background-color: #228B22; /* 深绿色背景 */
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            font-size: 14px;
            color: #666;
        }

        .footer span {
            color: #999;
        }

        /* 播放按钮样式 */
        .music-controls {
            text-align: center;
            margin-top: 20px;
        }

        .music-controls button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .music-controls button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <div class="profile">
            <h1>夜袭喵</h1>
            <p>练枪魔怔人</p>
            <p>一个正在努力的少年</p>
        </div>
        <div class="social-links">
            <a href="https://v.douyin.com/iUr1sts2/" class="tiktok">抖音</a>
            <a href="https://kook.vip/PvR2FC" class="kook">Kook</a>
        </div>
        <!-- 背景音乐控制按钮 -->
        <div class="music-controls">
            <button id="music-toggle">暂停音乐</button>
        </div>
    </div>

    <div class="footer">
        <span id="current-time"></span> | 网站已存在 <span id="website-duration"></span>
    </div>

    <!-- 背景音乐 -->
    <audio id="background-music" autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>

    <script>
        // 设置网站开始时间
        const startTime = new Date(2024, 11, 14, 13, 0, 0); // 注意月份从 0 开始计数

        function updateTime() {
            const currentTime = new Date();
            const duration = Math.floor((currentTime - startTime) / 1000); // 时间差（秒）
            const hours = Math.floor(duration / 3600);
            const minutes = Math.floor((duration % 3600) / 60);
            const seconds = duration % 60;

            document.getElementById('current-time').textContent = currentTime.toLocaleString();
            document.getElementById('website-duration').textContent = hours + '小时 ' + minutes + '分钟 ' + seconds + '秒';
        }

        setInterval(updateTime, 1000);
        updateTime();

        // 背景音乐控制
        const audio = document.getElementById('background-music');
        const toggleButton = document.getElementById('music-toggle');

        toggleButton.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                toggleButton.textContent = '暂停音乐';
            } else {
                audio.pause();
                toggleButton.textContent = '播放音乐';
            }
        });
    </script>
</body>
</html>
